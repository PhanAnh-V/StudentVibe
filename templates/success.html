<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }
        
        .success-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .success-icon {
            font-size: 4rem;
            color: #10b981;
            margin-bottom: 2rem;
        }
        
        .success-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }
        
        .success-message {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }
        
        .submission-id-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin: 2rem 0;
        }
        
        .submission-id-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .submission-id-code {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 1rem 0;
            font-family: 'Courier New', monospace;
        }
        
        .submission-id-message {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 0;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            margin-top: 2rem;
            text-decoration: none;
            display: inline-block;
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            color: white;
        }
        
        .back-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1.5rem;
            display: inline-block;
        }
        
        .back-link:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        
        <h1 class="success-title">ありがとうございました{% if student_name %}、{{ student_name }}さん{% endif %}！</h1>
        <p class="success-message">あなたの回答を受け取りました。</p>
        
        {% if submission_id %}
        <div class="submission-id-card">
            <h3 class="submission-id-title">
                <i class="fas fa-id-card me-2"></i>
                あなたの個人ID
            </h3>
            <div class="submission-id-code">{{ submission_id }}</div>
            <p class="submission-id-message">
                <strong>必ず保存してください！</strong> 後でバイブスクワッドを見つけるときに使います。
            </p>
        </div>
        {% endif %}
        
        <a href="{{ url_for('find_squad') }}" class="btn btn-primary">
            <i class="fas fa-search me-2"></i>
            マイスクワッドを探す
        </a>
        
        <div class="mt-4">
            <a href="{{ url_for('session_password') }}" class="back-link">
                <i class="fas fa-arrow-left me-1"></i>
                別の回答を送信
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
