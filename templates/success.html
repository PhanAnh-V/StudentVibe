<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 - 情報が送信されました</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="success-container">
    <i class="fas fa-bolt vibe-icon"></i>
    
    <!-- Success Icon -->
    <div class="success-icon">
        <i class="fas fa-check-circle"></i>
    </div>
    
    <!-- Main Title -->
    <div class="title-section">
        <h1 class="main-title-top">ありがとうございました</h1>
        {% if student_name %}
        <h2 class="main-title-bottom">{{ student_name }}さん！</h2>
        {% else %}
        <h2 class="main-title-bottom">！</h2>
        {% endif %}
    </div>
    
    <!-- Success Message -->
    <p class="success-message">
        あなたの「Vibe」が正常に送信されました。<br>
        素晴らしい回答をありがとうございます！
    </p>
    
    <!-- Personal ID Section -->
    {% if submission_id %}
    <div class="personal-id-section">
        <div class="id-label">あなたの個人ID</div>
        <div class="id-value">{{ submission_id }}</div>
        <div class="id-note">このIDを保存して、後でスクワッドを見つけてください</div>
    </div>
    {% endif %}
    
    <!-- Action Buttons -->
    <div class="action-buttons">
        <a href="{{ url_for('find_squad') }}" class="btn btn-primary">
            <i class="fas fa-search me-2"></i>
            スクワッドを見つける
        </a>
        
        <a href="{{ url_for('session_password') }}" class="btn btn-secondary">
            <i class="fas fa-home me-2"></i>
            新しいセッションを開始
        </a>
    </div>
    </div>

<style>
.success-container {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'Noto Sans JP', sans-serif;
    position: relative;
    overflow: hidden;
}

.success-container::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
}

.vibe-icon {
    position: absolute;
    top: 2rem;
    left: 2rem;
    font-size: 2rem;
    color: rgba(255, 255, 255, 0.8);
    animation: bounce 2s ease-in-out infinite;
}

.success-icon {
    font-size: 4rem;
    color: #4CAF50;
    margin-bottom: 1.5rem;
    text-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
    animation: checkmark 0.8s ease-out;
}

.title-section {
    text-align: center;
    margin-bottom: 1.5rem;
    animation: slideUp 0.6s ease-out 0.2s both;
}

.main-title-top {
    font-size: 2.2rem;
    font-weight: 600;
    color: white;
    margin: 0;
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    letter-spacing: 0.5px;
    line-height: 1.2;
}

.main-title-bottom {
    font-size: 3rem;
    font-weight: 700;
    color: #FFE082;
    margin: 0;
    text-shadow: 0 3px 15px rgba(255, 224, 130, 0.4);
    letter-spacing: 1px;
    animation: glow 2s ease-in-out infinite alternate;
}

.success-message {
    font-size: 1.2rem;
    color: rgba(255, 255, 255, 0.9);
    text-align: center;
    margin-bottom: 2rem;
    line-height: 1.6;
    text-shadow: 0 1px 5px rgba(0, 0, 0, 0.2);
    animation: slideUp 0.6s ease-out 0.4s both;
}

.personal-id-section {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    text-align: center;
    animation: slideUp 0.6s ease-out 0.6s both;
}

.id-label {
    font-size: 1rem;
    color: #666;
    margin-bottom: 0.5rem;
    font-weight: 500;
}

.id-value {
    font-size: 2rem;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 0.5rem;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
}

.id-note {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.4;
}

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 320px;
}

.action-buttons .btn {
    padding: 1rem 2rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    border: none;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    opacity: 0;
    transform: translateY(20px);
}

.btn-primary {
    background: linear-gradient(45deg, #4CAF50, #45a049);
    color: white;
    box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.9);
    color: #667eea;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.btn-secondary:hover {
    background: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 0.8; }
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

@keyframes checkmark {
    0% { transform: scale(0) rotate(45deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(45deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes glow {
    from { text-shadow: 0 3px 15px rgba(255, 224, 130, 0.4), 0 0 20px rgba(255, 224, 130, 0.2); }
    to { text-shadow: 0 3px 15px rgba(255, 224, 130, 0.8), 0 0 30px rgba(255, 224, 130, 0.4); }
}

@media (max-width: 768px) {
    .main-title-top {
        font-size: 1.8rem;
    }
    
    .main-title-bottom {
        font-size: 2.5rem;
    }
    
    .success-message {
        font-size: 1rem;
    }
    
    .personal-id-section {
        padding: 1.5rem;
        margin: 0 1rem 2rem;
    }
    
    .action-buttons {
        margin: 0 1rem;
    }
    
    .action-buttons .btn {
        width: 100%;
    }
}
</style>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Smooth entrance animation for buttons
    const buttons = document.querySelectorAll('.action-buttons .btn');
    buttons.forEach((btn, index) => {
        btn.style.opacity = '0';
        btn.style.transform = 'translateY(20px)';
        
        setTimeout(() => {
            btn.style.transition = 'all 0.4s ease-out';
            btn.style.opacity = '1';
            btn.style.transform = 'translateY(0)';
        }, 800 + (index * 200));
    });
});
</script>

</body>
</html>
