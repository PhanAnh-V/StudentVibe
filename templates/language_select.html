<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Check - Language Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Noto Sans JP', 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .language-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            padding: 4rem 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .language-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
        }
        
        .main-title {
            font-size: 3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        
        .welcome-message {
            font-size: 1.25rem;
            color: #4a5568;
            margin-bottom: 3rem;
            line-height: 1.6;
            font-weight: 400;
        }
        
        .language-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .language-btn {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-decoration: none;
            color: #2d3748;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .language-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .language-btn:hover {
            color: white;
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3);
        }
        
        .language-btn:hover::before {
            left: 0;
        }
        
        .language-flag {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .language-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .vibe-icon {
            position: absolute;
            opacity: 0.1;
            font-size: 6rem;
            color: #667eea;
            top: -2rem;
            right: -2rem;
            transform: rotate(15deg);
            z-index: 0;
        }
        
        @media (max-width: 768px) {
            .language-container {
                padding: 3rem 2rem;
                margin: 1rem;
            }
            
            .main-title {
                font-size: 2.2rem;
            }
            
            .welcome-message {
                font-size: 1.1rem;
            }
            
            .language-buttons {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .language-btn {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-container">
        <i class="fas fa-bolt vibe-icon"></i>
        
        <!-- Teacher Login Link -->
        <div style="position: absolute; top: 1rem; right: 1.5rem;">
            <a href="{{ url_for('teacher_login') }}" style="color: #9ca3af; text-decoration: none; font-size: 0.9rem; font-weight: 400;">
                先生ログイン
            </a>
        </div>
        
        <h1 class="main-title">
            「Vibe Check」へようこそ！
        </h1>
        
        <p class="welcome-message">
            君の本当の気持ちや好きなことを知りたいな。<br>
            一番リラックスして自分を表現できる言語を選んでね！
        </p>
        
        <div class="language-buttons">
            <a href="{{ url_for('select_language', lang='en') }}" class="language-btn">
                <div class="language-flag">🇺🇸</div>
                <div class="language-name">English</div>
            </a>
            
            <a href="{{ url_for('select_language', lang='vi') }}" class="language-btn">
                <div class="language-flag">🇻🇳</div>
                <div class="language-name">Tiếng Việt</div>
            </a>
            
            <a href="{{ url_for('select_language', lang='zh') }}" class="language-btn">
                <div class="language-flag">🇨🇳</div>
                <div class="language-name">中文</div>
            </a>
            
            <a href="{{ url_for('select_language', lang='ja') }}" class="language-btn">
                <div class="language-flag">🇯🇵</div>
                <div class="language-name">日本語</div>
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
