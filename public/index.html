<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck - AI-Powered Group Formation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            color: white;
            font-weight: 600;
            margin: 10px;
            min-width: 200px;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: white;
        }
        .app-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .status-badge {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="login-card">
            <h1 class="app-title">
                <i class="fas fa-users"></i> VibeCheck
            </h1>
            <div class="status-badge">
                <i class="fas fa-check-circle"></i> App Successfully Deployed!
            </div>
            <p class="lead mb-4">AI-powered group formation tool for teachers and club leaders</p>
            
            <div class="d-grid gap-2">
                <button class="btn login-btn" onclick="alert('Backend integration in progress!')">
                    <i class="fas fa-chalkboard-teacher me-2"></i>Teacher Login
                </button>
                <button class="btn login-btn" onclick="alert('Backend integration in progress!')">
                    <i class="fas fa-user-graduate me-2"></i>Student Login
                </button>
                <button class="btn login-btn" onclick="showHealthCheck()">
                    <i class="fas fa-heartbeat me-2"></i>Health Check
                </button>
            </div>

            <div class="mt-4">
                <small class="text-muted">
                    <i class="fas fa-info-circle"></i> 
                    This is a static frontend. Backend Python/Flask integration coming soon!
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function showHealthCheck() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                alert(`Health Check Successful!\nStatus: ${data.status}\nTimestamp: ${data.timestamp}`);
            } catch (error) {
                alert('Health check failed: ' + error.message);
            }
        }

        // Add some interactive elements
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 VibeCheck app loaded successfully!');
            console.log('📊 Firebase App Hosting deployment complete');
            console.log('🔗 Node.js Express server running');
        });
    </script>
</body>
</html>
