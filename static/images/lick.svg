<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 150 150">
  <!-- Cat body -->
  <ellipse cx="75" cy="95" rx="40" ry="30" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  
  <!-- Cat head -->
  <circle cx="75" cy="55" r="25" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  
  <!-- Cat ears -->
  <polygon points="60,35 65,20 75,30" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  <polygon points="90,35 85,20 75,30" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  
  <!-- Cat eyes (closed, content) -->
  <path d="M 65 50 Q 70 55 75 50" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 85 50 Q 80 55 75 50" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Cat tongue (licking) -->
  <ellipse cx="75" cy="65" rx="4" ry="8" fill="#FF69B4" stroke="#E91E63" stroke-width="1"/>
  
  <!-- Cat mouth -->
  <path d="M 70 60 Q 75 65 80 60" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Cat tail (curled up happily) -->
  <path d="M 115 90 Q 130 80 125 65 Q 120 50 105 55" fill="none" stroke="#6A1B9A" stroke-width="4"/>
  
  <!-- Paws -->
  <circle cx="60" cy="120" r="6" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  <circle cx="90" cy="120" r="6" fill="#9C27B0" stroke="#6A1B9A" stroke-width="2"/>
  
  <!-- Whiskers -->
  <path d="M 45 55 L 55 53" stroke="#000" stroke-width="1"/>
  <path d="M 45 60 L 55 58" stroke="#000" stroke-width="1"/>
  <path d="M 95 53 L 105 55" stroke="#000" stroke-width="1"/>
  <path d="M 95 58 L 105 60" stroke="#000" stroke-width="1"/>
</svg>